name: Build ONNX Runtime Java DirectML + OpenVINO

on:
  workflow_dispatch:
    inputs:
      ort_ref:
        description: "ONNX Runtime git ref/tag to build"
        required: true
        default: "v1.26.0"
      build_config:
        description: "Build configuration"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
      openvino_device:
        description: "Default OpenVINO target device"
        required: true
        default: "CPU"
        type: choice
        options:
          - CPU
          - GPU
          - NPU

  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"

jobs:
  build-windows-java-directml:
    name: Build Windows x64 Java + DirectML + OpenVINO
    runs-on: windows-2022
    timeout-minutes: 360

    env:
      ORT_REF: ${{ inputs.ort_ref || 'v1.26.0' }}
      BUILD_CONFIG: ${{ inputs.build_config || 'Release' }}
      OPENVINO_DEVICE: ${{ inputs.openvino_device || 'CPU' }}
      OPENVINO_PACKAGE_VERSION: "2025.3.0"
      ORT_DIR: C:\ort
      ARTIFACT_DIR: C:\ort-artifacts

    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4

      - name: Show runner environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "OS:"
          Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsHardwareAbstractionLayer

          Write-Host "`nVisual Studio:"
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          Write-Host "`nPython:"
          python --version

          Write-Host "`nCMake:"
          cmake --version

          Write-Host "`nJava:"
          $env:JAVA_HOME = $env:JAVA_HOME_17_X64
          $env:PATH = "$env:JAVA_HOME\bin;$env:PATH"
          java -version
          javac -version

          Write-Host "`nGit:"
          git --version

      - name: Checkout ONNX Runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (Test-Path $env:ORT_DIR) {
            Remove-Item -Recurse -Force $env:ORT_DIR
          }

          git clone `
            --recursive `
            --branch $env:ORT_REF `
            --depth 1 `
            https://github.com/microsoft/onnxruntime.git `
            $env:ORT_DIR

          Set-Location $env:ORT_DIR
          git submodule update --init --recursive --depth 1

          Write-Host "Checked out:"
          git rev-parse HEAD

      - name: Install Python build dependencies
        shell: pwsh
        working-directory: C:\ort
        run: |
          $ErrorActionPreference = "Stop"

          python -m pip install --upgrade pip setuptools wheel

          if (Test-Path "requirements-dev.txt") {
            python -m pip install -r requirements-dev.txt
          }

      - name: Install OpenVINO build dependencies
        shell: pwsh
        working-directory: C:\ort
        run: |
          $ErrorActionPreference = "Stop"

          python -m pip install "openvino==$env:OPENVINO_PACKAGE_VERSION"

          $probeScript = @'
          import json
          import pathlib
          import openvino

          package_dir = pathlib.Path(openvino.__file__).resolve().parent
          cmake_files = sorted(package_dir.rglob("OpenVINOConfig.cmake"))
          if not cmake_files:
              raise RuntimeError(f"OpenVINOConfig.cmake not found under {package_dir}")

          dll_dirs = sorted({str(path.parent) for path in package_dir.rglob("*.dll")})
          print(json.dumps({
              "package_dir": str(package_dir),
              "cmake_dir": str(cmake_files[0].parent),
              "dll_dirs": dll_dirs,
          }))
          '@

          $openvinoInfo = python -c $probeScript | ConvertFrom-Json

          "OpenVINO_DIR=$($openvinoInfo.cmake_dir)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$($openvinoInfo.package_dir)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENVINO_PACKAGE_DIR=$($openvinoInfo.package_dir)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENVINO_DLL_DIRS=$($openvinoInfo.dll_dirs -join ';')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $openvinoInfo.dll_dirs | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Write-Host "OpenVINO package directory: $($openvinoInfo.package_dir)"
          Write-Host "OpenVINO CMake directory: $($openvinoInfo.cmake_dir)"
          Write-Host "OpenVINO DLL directories:"
          $openvinoInfo.dll_dirs | ForEach-Object { Write-Host "  $_" }

      - name: Build ONNX Runtime Java with DirectML + OpenVINO
        shell: cmd
        working-directory: C:\ort
        run: |
          set JAVA_HOME=%JAVA_HOME_17_X64%
          set PATH=%JAVA_HOME%\bin;%PATH%

          call build.bat ^
            --config %BUILD_CONFIG% ^
            --build_java ^
            --build_shared_lib ^
            --use_dml ^
            --use_openvino %OPENVINO_DEVICE% ^
            --parallel ^
            --skip_tests ^
            --compile_no_warning_as_error

      - name: Collect build outputs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path $env:ARTIFACT_DIR | Out-Null

          $javaLibDir = Join-Path $env:ORT_DIR "build\Windows\$env:BUILD_CONFIG\java\build\libs"
          if (-not (Test-Path $javaLibDir)) {
            throw "Java libs directory not found: $javaLibDir"
          }

          Write-Host "Java libs:"
          Get-ChildItem $javaLibDir -Recurse | Format-Table FullName, Length

          Copy-Item "$javaLibDir\*.jar" $env:ARTIFACT_DIR -Force

          $nativeCandidates = @(
            "build\Windows\$env:BUILD_CONFIG\$env:BUILD_CONFIG",
            "build\Windows\$env:BUILD_CONFIG",
            "build\Windows\$env:BUILD_CONFIG\java\build\libs"
          )

          foreach ($rel in $nativeCandidates) {
            $dir = Join-Path $env:ORT_DIR $rel
            if (Test-Path $dir) {
              Get-ChildItem $dir -Recurse -Include `
                "onnxruntime.dll", `
                "onnxruntime4j_jni.dll", `
                "DirectML.dll", `
                "onnxruntime_providers*.dll" `
                -ErrorAction SilentlyContinue |
                ForEach-Object {
                  Copy-Item $_.FullName $env:ARTIFACT_DIR -Force
                }
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($env:OPENVINO_DLL_DIRS)) {
            foreach ($dir in ($env:OPENVINO_DLL_DIRS -split ';')) {
              if (Test-Path $dir) {
                Get-ChildItem $dir -Filter "*.dll" -File | ForEach-Object {
                  Copy-Item $_.FullName $env:ARTIFACT_DIR -Force
                }
              }
            }
          }

          Write-Host "Collected artifacts:"
          Get-ChildItem $env:ARTIFACT_DIR | Format-Table Name, Length

      - name: Verify generated Java + native artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $jar = Join-Path $env:ARTIFACT_DIR "onnxruntime.jar"
          if (-not (Test-Path $jar)) {
            throw "onnxruntime.jar not found in artifact directory."
          }

          $requiredFiles = @(
            "onnxruntime.jar",
            "onnxruntime.dll",
            "onnxruntime4j_jni.dll",
            "DirectML.dll",
            "onnxruntime_providers_shared.dll",
            "onnxruntime_providers_openvino.dll",
            "openvino.dll",
            "openvino_intel_cpu_plugin.dll",
            "tbb12.dll"
          )

          foreach ($file in $requiredFiles) {
            $path = Join-Path $env:ARTIFACT_DIR $file
            if (-not (Test-Path $path)) {
              throw "Required artifact missing: $file"
            }
          }

          if (-not (Get-ChildItem $env:ARTIFACT_DIR -Filter "openvino*.dll" -File)) {
            throw "No OpenVINO runtime DLLs were collected."
          }

          Write-Host "Inspecting main jar:"
          jar tf $jar | Select-String -Pattern "ai/onnxruntime|META-INF" | Select-Object -First 20

          foreach ($jarEntry in @("DirectML.dll", "openvino.dll", "openvino_intel_cpu_plugin.dll", "tbb12.dll")) {
            if (-not (jar tf $jar | Select-String -SimpleMatch $jarEntry)) {
              Write-Host "OK: $jarEntry is not bundled in onnxruntime.jar"
            } else {
              throw "$jarEntry should be a sidecar DLL, not bundled in onnxruntime.jar"
            }
          }

          Write-Host "OK: found Java jar and required native DLLs:"
          Get-ChildItem $env:ARTIFACT_DIR | Format-Table Name, Length

      - name: Create checksum file
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Set-Location $env:ARTIFACT_DIR

          Get-ChildItem -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash)  $($_.Name)"
          } | Set-Content SHA256SUMS.txt

          Get-Content SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-java-directml-openvino-${{ env.ORT_REF }}-${{ env.BUILD_CONFIG }}-windows-x64
          path: C:\ort-artifacts\*
          if-no-files-found: error
          retention-days: 14
